# ════════════════════════════════════════════════════════════
#  .github/workflows/ci.yml — NexStore CI/CD
#
#  O QUE FAZ:
#    1. Roda os testes automatizados em todo push/PR
#    2. Faz o build da imagem Docker (em push na main)
#    3. Publica a imagem no GitHub Container Registry (ghcr.io)
#
#  CONFIGURAR antes de usar:
#    Não é necessário configurar secrets para os steps 1-3.
#    Para o step 4 (publicar imagem), o GITHUB_TOKEN já é automático.
# ════════════════════════════════════════════════════════════

name: CI/CD — NexStore

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ex: alvarossantos/e-commerce-node

jobs:

  # ─────────────────────────────────────────────────────────
  #  JOB 1: Testes automatizados
  # ─────────────────────────────────────────────────────────
  test:
    name: 🧪 Testes Automatizados
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🧪 Executar testes com Jest
        run: npm test -- --coverage --forceExit
        env:
          # O banco é mockado nos testes — variáveis fictícias para o .env
          NODE_ENV: test
          JWT_SECRET: chave_de_teste_apenas
          DB_HOST: localhost
          DB_USER: test
          DB_PASS: test
          DB_NAME: test_db
          DB_PORT: 5432
          PORT: 3000

      - name: 📊 Publicar relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  #  JOB 2: Build Docker (apenas na branch main)
  # ─────────────────────────────────────────────────────────
  docker:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                   # só roda se os testes passarem
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write             # necessário para publicar no ghcr.io

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🔑 Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: ⚡ Configurar Docker Buildx (build multi-plataforma)
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha       # cache do GitHub Actions (builds mais rápidos)
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────
  #  JOB 3: Notificação de status (resumo no PR)
  # ─────────────────────────────────────────────────────────
  summary:
    name: 📋 Resumo do Pipeline
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
      - name: ✅ Pipeline concluído
        run: |
          echo "## Resultado do Pipeline 🚀" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Testes | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
